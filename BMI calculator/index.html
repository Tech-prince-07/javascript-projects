<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
    <link rel="stylesheet" href="style.css">
</head> 
<body>
    <div class="heading">BMI CALCULATOR</div>
    <div class="weight">
        <h3>Enter your weight:</h3>
        <input class="inputWeight" type="number" placeholder="Weight in (kg)">
    </div>

    <div class="height">
        <h3>Enter your height:</h3>
        <input class="inputHeight" type="number" placeholder="height in (cm)">
    </div>

    <button class="CalcBMI" >Calculate BMI </button>

    <div class="info">
        <ul>
            <li>Underweight: BMI < 18.5</li>
            <li>Normal weight: BMI 18.5 – 24.9</li>
            <li>Overweight: BMI 25 – 29.9</li>
            <li>Obesity: BMI ≥ 30 </li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
